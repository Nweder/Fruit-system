<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Fruktkorg Göteborg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      background: white;
      max-width: 500px;
      margin: 40px auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #2ecc71;
      color: white;
      padding: 14px;
      border: none;
      width: 100%;
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #27ae60;
    }

    /* 📱 Mobil */
    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 20px;
      }

      h1 {
        font-size: 22px;
      }

      button {
        font-size: 16px;
      }
    }

    /*  iPad / Tablet */
    @media (min-width: 601px) and (max-width: 1024px) {
      .container {
        max-width: 600px;
      }
    }

    /* Desktop */
    @media (min-width: 1025px) {
      .container {
        max-width: 500px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Beställ fruktkorg 🍎</h1>
  <p>Leverans inom 24h i Göteborg</p>

  <form action="https://formsubmit.co/M.neweder@gmail.com" method="POST">

    <input type="text" name="Företag" placeholder="Företag" required>

    <input type="email" name="Email" placeholder="Email" required>

    <select name="Produkt">
      <option>Small - 199 kr</option>
      <option>Medium - 299 kr</option>
      <option>Large - 399 kr</option>
    </select>

    <textarea name="Meddelande" placeholder="Extra info (valfritt)"></textarea>

    <input type="hidden" name="_subject" value="Ny beställning - MN Frukt">
    <input type="hidden" name="_captcha" value="false">

    <input type="hidden" name="_autoresponse"
      value="Tack för din beställning! Vi kontaktar er inom 1–2 timmar.">

    <input type="hidden" name="_next" value="https://din-sida.se/tack.html">

    <button type="submit">Beställ</button>
  </form>
</div>

</body>
</html>
