<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruktkorg Göteborg – MN Frukt</title>

  <style>
    :root{
      --green:#2ecc71;
      --green-dark:#27ae60;
      --bg:#f5f7f6;
      --text:#222;
      --muted:#666;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* HEADER */
    .hero{
      background:linear-gradient(135deg,#2ecc71,#27ae60);
      color:white;
      padding:40px 20px;
      text-align:center;
    }

    .hero h1{
      margin:0;
      font-size:28px;
      animation:fadeIn 1s ease;
    }

    .hero p{
      margin-top:10px;
      opacity:0.9;
    }

    /* CONTAINER */
    .container{
      max-width:520px;
      margin:-30px auto 30px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      animation:slideUp 0.6s ease;
    }

    /* BADGES */
    .badges{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      font-size:13px;
      color:var(--muted);
    }

    /* FORM */
    input, textarea, select{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:16px;
      transition:0.2s;
    }

    input:focus, textarea:focus, select:focus{
      border-color:var(--green);
      outline:none;
      box-shadow:0 0 0 2px rgba(46,204,113,0.2);
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:8px;
      background:var(--green);
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:var(--green-dark);
      transform:scale(1.02);
    }

    /* SUCCESS */
    .success{
      display:none;
      text-align:center;
      color:var(--green-dark);
      font-weight:bold;
      font-size:18px;
      padding:20px;
      animation:fadeIn 0.6s ease;
    }

    /* LOADING */
    .loading{
      display:none;
      text-align:center;
      margin-top:10px;
      color:#999;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      font-size:13px;
      color:#888;
      margin-top:15px;
    }

    /* ANIMATIONS */
    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    @keyframes slideUp{
      from{transform:translateY(30px); opacity:0}
      to{transform:translateY(0); opacity:1}
    }

    /* RESPONSIVE */
    @media (max-width:600px){
      .container{margin: -20px 15px 20px;}
      .hero h1{font-size:24px;}
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="hero">
  <h1>Fruktkorg i Göteborg 🍎</h1>
  <p>Snabb leverans • Enkelt att beställa</p>
</div>

<!-- FORM -->
<div class="container">

  <div class="badges">
    <span>🚚 Leverans 24h</span>
    <span>🏢 För företag</span>
  </div>

  <form id="form">

    <input type="text" name="Företag" placeholder="Företag" required>

    <input type="email" name="Email" placeholder="Email" required>

    <select name="Produkt">
      <option>Small - 199 kr</option>
      <option>Medium - 299 kr</option>
      <option>Large - 399 kr</option>
    </select>

    <textarea name="Meddelande" placeholder="Extra info (valfritt)"></textarea>

    <!-- FormSubmit config -->
    <input type="hidden" name="_subject" value="Ny beställning - MN Frukt">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_autoresponse"
      value="Tack för din beställning! Vi kontaktar er inom 1–2 timmar.">

    <button type="submit">Beställ nu</button>

  </form>

  <div class="loading" id="loading">⏳ Skickar...</div>

  <div class="success" id="success">
    ✅ Tack för din beställning!<br>
    Vi kontaktar er inom 1–2 timmar.
  </div>

  <div class="footer">
    MN Frukt • Göteborg
  </div>

</div>

<!-- SCRIPT -->
<script>
const form = document.getElementById("form");
const success = document.getElementById("success");
const loading = document.getElementById("loading");

form.addEventListener("submit", function(e){
  e.preventDefault();

  loading.style.display = "block";

  fetch("https://formsubmit.co/ajax/M.neweder@gmail.com", {
    method: "POST",
    body: new FormData(form)
  })
  .then(res => res.json())
  .then(() => {
    loading.style.display = "none";
    form.style.display = "none";
    success.style.display = "block";

    window.scrollTo({ top: 0, behavior: "smooth" });
  })
  .catch(() => {
    loading.innerText = "❌ Något gick fel, testa igen";
  });
});
</script>

</body>
</html>
